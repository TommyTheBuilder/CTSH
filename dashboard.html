<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
<header class="topbar topbar-modern admin-topbar">
  <div class="system-logo-wrap">
    <img src="/public/logo.png" alt="Systemlogo" class="system-logo">
    <a href="dashboard.html" class="system-logo-home" aria-label="Zum Dashboard"></a>
    <a href="/public/dashboard.html" class="system-logo-home" aria-label="Zum Dashboard"></a>
  </div>
  <div class="row topbar-actions" style="align-items:center;">
    <div class="settings-menu-wrap" id="settingsMenuWrap">
      <button class="secondary settings-trigger" id="settingsTriggerBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Einstellungen öffnen">⚙️</button>
      <div class="settings-menu" id="settingsMenu" role="menu" aria-label="Einstellungen">
        <button class="secondary" id="openChangePasswordBtn" role="menuitem">Passwort ändern</button>
        <button class="secondary" id="openAdminBtn" role="menuitem" style="display:none;">Administration</button>
        <button class="secondary" id="menuDarkmodeBtn" role="menuitem">Darkmode umschalten</button>
        <button class="secondary" id="logoutBtn" role="menuitem">Logout</button>
      </div>
    </div>
    <div id="themeToggleMount" style="display:none;"></div>
  </div>
</header>

<main class="dashboard-main module-dashboard-main">
  <section class="dashboard-header admin-header">
    <div class="dashboard-title-row"><b>Modul-Dashboard</b> <span class="pill" id="me">-</span></div>
    <p class="muted" style="margin:8px 0 0;">Bitte wählen Sie ein Modul aus.</p>
  </section>

  <section class="card module-dashboard-card">
    <div class="module-grid">
      <a class="module-button module-button--stacked" href="/app.html" aria-label="Paletten Buchungen">
        <span class="module-button__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
            <rect x="10" y="8" width="44" height="48" rx="2" fill="#FFD98A" stroke="#0B1220" stroke-width="3"></rect>
            <rect x="18" y="14" width="6" height="36" fill="#FFC34D"></rect>
            <rect x="30" y="14" width="6" height="36" fill="#FFC34D"></rect>
            <rect x="42" y="14" width="6" height="36" fill="#FFC34D"></rect>
            <rect x="24" y="22" width="6" height="10" fill="#F8FAFC"></rect>
            <rect x="36" y="22" width="6" height="10" fill="#F8FAFC"></rect>
            <rect x="24" y="38" width="6" height="10" fill="#F8FAFC"></rect>
            <rect x="36" y="38" width="6" height="10" fill="#F8FAFC"></rect>
            <circle cx="16" cy="16" r="2.5" fill="#0B1220"></circle>
            <circle cx="48" cy="16" r="2.5" fill="#0B1220"></circle>
            <circle cx="16" cy="50" r="2.5" fill="#0B1220"></circle>
            <circle cx="48" cy="50" r="2.5" fill="#0B1220"></circle>
          </svg>
        </span>
        <span class="module-button__title">Paletten Buchungen</span>
      </a>
      <a class="module-button module-button--stacked" id="containerAdminLink" href="/container-registration" style="display:none;" aria-label="Container Anmeldung">
        <span class="module-button__icon" aria-hidden="true">
          <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
            <rect x="10" y="14" width="44" height="28" rx="2" fill="#FFC85A" stroke="#0B1220" stroke-width="3"></rect>
            <rect x="10" y="14" width="5" height="28" fill="#FFA53B"></rect>
            <rect x="20" y="20" width="4" height="16" rx="1" fill="#0B1220"></rect>
            <rect x="28" y="20" width="4" height="16" rx="1" fill="#0B1220"></rect>
            <rect x="36" y="20" width="4" height="16" rx="1" fill="#0B1220"></rect>
            <rect x="44" y="20" width="4" height="16" rx="1" fill="#0B1220"></rect>
            <rect x="12" y="42" width="46" height="5" fill="#F25578" stroke="#0B1220" stroke-width="3"></rect>
            <circle cx="21" cy="48" r="5" fill="#8FB7E8" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="36" cy="48" r="5" fill="#8FB7E8" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="52" cy="48" r="5" fill="#8FB7E8" stroke="#0B1220" stroke-width="3"></circle>
            <rect x="48" y="18" width="3" height="3" fill="#F8FAFC"></rect>
            <rect x="48" y="24" width="3" height="3" fill="#F8FAFC"></rect>
          </svg>
        </span>
        <span class="module-button__title">Container Anmeldung</span>
      </a>
      <a class="module-button module-button--stacked" id="containerPlanningLink" href="/modules/container-planning/index.html" style="display:none;">
        <span class="module-button__icon" aria-hidden="true">
          <svg viewBox="0 0 72 64" focusable="false" aria-hidden="true">
            <path d="M18 14c0-6 5-11 11-11" fill="none" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round"></path>
            <path d="M18 21c0-10 8-18 18-18" fill="none" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round"></path>
            <path d="M18 28c0-14 11-25 25-25" fill="none" stroke="#F8FAFC" stroke-width="3" stroke-linecap="round"></path>
            <path d="M12 38l8-13h12v24H12z" fill="#2F80ED" stroke="#0B1220" stroke-width="3" stroke-linejoin="round"></path>
            <rect x="32" y="22" width="30" height="20" rx="2" fill="#FF4D5A" stroke="#0B1220" stroke-width="3"></rect>
            <rect x="20" y="29" width="7" height="6" fill="#E6F0FF"></rect>
            <rect x="37" y="26" width="4" height="13" rx="1" fill="#0B1220"></rect>
            <rect x="45" y="26" width="4" height="13" rx="1" fill="#0B1220"></rect>
            <rect x="53" y="26" width="4" height="13" rx="1" fill="#0B1220"></rect>
            <rect x="22" y="42" width="30" height="5" fill="#6B7280" stroke="#0B1220" stroke-width="3"></rect>
            <path d="M52 42l8 6h6" fill="none" stroke="#0B1220" stroke-width="3" stroke-linejoin="round"></path>
            <circle cx="20" cy="49" r="5" fill="#3A3A3A" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="35" cy="49" r="5" fill="#3A3A3A" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="46" cy="49" r="5" fill="#3A3A3A" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="58" cy="49" r="5" fill="#3A3A3A" stroke="#0B1220" stroke-width="3"></circle>
            <circle cx="20" cy="49" r="2" fill="#A0AEC0"></circle>
            <circle cx="35" cy="49" r="2" fill="#A0AEC0"></circle>
            <circle cx="46" cy="49" r="2" fill="#A0AEC0"></circle>
            <circle cx="58" cy="49" r="2" fill="#A0AEC0"></circle>
          </svg>
        </span>
        <span class="module-button__title">Container und LKW</span>
        <span class="module-button__subtitle">Planung</span>
      </a>
    </div>
    <p id="moduleMsg" style="margin:12px 0 0;"></p>
  </section>
</main>

<div class="modalBack" id="passwordModalBack" aria-hidden="true">
  <div class="modal" style="max-width:520px; width:100%; box-shadow:0 18px 45px rgba(15,23,42,.3); border:1px solid #e5e7eb;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="margin:0;">Passwort ändern</h3>
      <button class="secondary" type="button" id="closePasswordModalBtn" style="width:auto;">✕</button>
    </div>
    <div class="row">
      <div>
        <label>Aktuelles Passwort</label>
        <input id="currentPassword" type="password" autocomplete="new-password" placeholder="Aktuelles Passwort">
      </div>
      <div>
        <label>Neues Passwort</label>
        <input id="newPassword" type="password" autocomplete="new-password" placeholder="Mindestens 8 Zeichen">
      </div>
      <div>
        <label>Neues Passwort wiederholen</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Passwort wiederholen">
      </div>
    </div>
    <p id="passwordModalMsg" style="margin:10px 0 0;"></p>
    <div class="row" style="justify-content:flex-end; margin-top:10px;">
      <button class="secondary" type="button" id="cancelPasswordBtn" style="min-width:140px;">Abbrechen</button>
      <button class="primary" id="savePasswordBtn" type="button">Passwort speichern</button>
    </div>
  </div>
</div>

<footer class="site-copyright">© 2026 / CTSH Systems</footer>
<script src="/public/theme.js"></script>
<script src="/public/dashboard.js"></script>
</body>
</html>
