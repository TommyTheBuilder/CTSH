<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Offene Paletten</title>
  <link rel="stylesheet" href="/public/styles.css?v=20260317-6">
</head>
<body>
<header class="topbar topbar-modern admin-topbar">
  <div class="system-logo-wrap pallet-topbar-logo">
    <img src="/public/logo.png" alt="Systemlogo" class="system-logo">
    <a href="/modules/pallets/index.html?v=20260317-6" class="system-logo-home" aria-label="Zum Palettenmodul"></a>
  </div>
  <div></div>
  <div class="row topbar-actions" style="align-items:center;">
    <button class="secondary" id="backToPalletsBtn" type="button" style="width:auto; min-width:190px;">Zum Palettenmodul</button>
    <button class="secondary" id="logoutBtn" type="button" style="width:auto; min-width:140px;">Logout</button>
    <div id="themeToggleMount" style="display:none;"></div>
  </div>
</header>

<main class="dashboard-main module-dashboard-main pallet-app-main">
  <section class="dashboard-header admin-header module-hero pallet-app-hero pallet-open-page-hero">
    <div class="module-hero__copy">
      <span class="module-hero__eyebrow">Offene Paletten</span>
      <div class="dashboard-title-row">
        <b>Offene Paletten</b>
        <span class="pill" id="me">-</span>
      </div>
    </div>
    <div class="pallet-open-hero-actions pallet-open-hero-actions--stacked">
      <button class="secondary pallet-open-create-button" id="openCustomerModalBtn" type="button">Kunden + Adressen</button>
      <button class="secondary pallet-open-create-button" id="openCreateBookingModalBtn" type="button">Neue Buchung</button>
    </div>
  </section>

  <section class="pallet-open-page-grid">
    <article class="card module-dashboard-card pallet-form-card">
      <div class="module-dashboard-card__head">
        <div>
          <span class="module-section-kicker">Übersicht</span>
          <h2>Buchungen</h2>
        </div>
      </div>

      <div class="pallet-urgency-legend pallet-urgency-legend--page" aria-label="Dringlichkeit">
        <span class="pallet-urgency-legend__label">Dringlichkeit</span>
        <span class="pallet-urgency-badge pallet-urgency-badge--low">Niedrig</span>
        <span class="pallet-urgency-badge pallet-urgency-badge--medium">Mittel</span>
        <span class="pallet-urgency-badge pallet-urgency-badge--high">Hoch</span>
        <span class="pallet-urgency-badge pallet-urgency-badge--critical">Kritisch</span>
      </div>

      <div class="row">
        <div>
          <label for="filterTitle">Titel</label>
          <select id="filterTitle">
            <option value="">Alle</option>
            <option value="abholung">Abholung</option>
            <option value="rueckfuehrung">R&uuml;ckf&uuml;hrung</option>
            <option value="firma_zu_firma">Firma zu Firma</option>
          </select>
        </div>
        <div>
          <label for="filterCompany">Kunde / Firma</label>
          <input id="filterCompany" placeholder="Firma filtern">
        </div>
        <div>
          <label for="filterCity">Ort</label>
          <input id="filterCity" placeholder="Ort filtern">
        </div>
        <div>
          <label for="filterPostalCode">Postleitzahl</label>
          <input id="filterPostalCode" placeholder="PLZ filtern">
        </div>
        <div>
          <label for="filterCountry">Land</label>
          <select id="filterCountry"></select>
        </div>
        <div>
          <label for="filterOrderNo">Auftragsnummer</label>
          <input id="filterOrderNo" placeholder="Auftragsnummer filtern">
        </div>
        <div>
          <label for="filterStatus">Status</label>
          <select id="filterStatus">
            <option value="">Alle</option>
            <option value="open">Offen</option>
            <option value="truck_planned">LKW eingeplant</option>
            <option value="completed_waiting_document">Erledigt - warten auf Beleg</option>
            <option value="document_booked_scanned">Beleg gebucht und gescannt</option>
          </select>
        </div>
      </div>

      <div class="pallet-open-toolbar" style="margin-top:16px;">
        <button class="secondary" id="reloadOpenPalletsBtn" type="button">Neu laden</button>
        <button class="secondary" id="resetOpenPalletFiltersBtn" type="button">Filter zur&uuml;cksetzen</button>
      </div>

      <div class="pallet-section-table" style="margin-top:16px;">
        <div id="openPalletsTableWrap" style="overflow:auto;"></div>
      </div>
      <div class="pallet-open-toolbar pallet-open-toolbar--pagination" id="openPalletPagination" style="margin-top:16px;">
        <button class="secondary" id="openPalletPrevBtn" type="button">Zur&uuml;ck</button>
        <button class="secondary" id="openPalletNextBtn" type="button">Weiter</button>
      </div>
    </article>
  </section>
</main>

<div class="modalBack" id="bookingModalBack" aria-hidden="true">
  <div class="modal password-modal pallet-booking-modal pallet-booking-detail-modal" role="dialog" aria-modal="true" aria-labelledby="bookingModalTitle">
    <div class="password-modal-head pallet-booking-modal-head">
      <div>
        <span class="module-section-kicker">Offene Paletten</span>
        <h3 id="bookingModalTitle">Buchung</h3>
      </div>
      <div class="pallet-booking-modal-head__actions">
        <button class="secondary" id="bookingModalEditBtn" type="button" style="display:none;">Bearbeiten</button>
        <button class="secondary" id="bookingModalTabBtn" type="button" style="display:none;">Detailansicht</button>
        <button class="secondary" id="closeBookingModalBtn" type="button">Schlie&szlig;en</button>
      </div>
    </div>
    <p id="bookingModalMsg" class="pallet-message"></p>
    <div id="bookingModalBody"></div>
  </div>
</div>

<div class="modalBack" id="customerModalBack" aria-hidden="true">
  <div class="modal password-modal pallet-booking-modal pallet-customer-modal" role="dialog" aria-modal="true" aria-labelledby="customerModalTitle">
    <div class="password-modal-head">
      <div>
        <span class="module-section-kicker">Stammdaten</span>
        <h3 id="customerModalTitle">Kunden + Adressen</h3>
      </div>
      <button class="secondary" id="closeCustomerModalBtn" type="button">Schlie&szlig;en</button>
    </div>
    <div class="pallet-customer-modal__layout">
      <div class="pallet-customer-modal__list">
        <div class="pallet-customer-modal__list-head">
          <strong>Gespeicherte Kunden</strong>
          <button class="secondary" id="newCustomerBtn" type="button">Neu</button>
        </div>
        <div id="customerListWrap" class="pallet-customer-list"></div>
      </div>
      <div class="pallet-customer-modal__form">
        <div class="row">
          <div>
            <label for="customerName">Kundenname</label>
            <input id="customerName" placeholder="z.B. Muster GmbH">
          </div>
          <div>
            <label for="customerStreet">Stra&szlig;e / Hausnummer</label>
            <input id="customerStreet" placeholder="z.B. Musterstra&szlig;e 1">
          </div>
          <div>
            <label for="customerAddressExtra">Adresszusatz</label>
            <input id="customerAddressExtra" placeholder="z.B. Tor 2 / Lager Nord">
          </div>
          <div>
            <label for="customerPostalCode">Postleitzahl</label>
            <input id="customerPostalCode" placeholder="z.B. 20095">
          </div>
          <div>
            <label for="customerCity">Ort</label>
            <input id="customerCity" placeholder="z.B. Hamburg">
          </div>
          <div>
            <label for="customerCountry">Land</label>
            <select id="customerCountry"></select>
          </div>
        </div>
        <p id="customerModalMsg" class="pallet-message"></p>
        <div class="row" style="justify-content:flex-end; margin-top:10px;">
          <button class="secondary" id="cancelCustomerModalBtn" type="button">Abbrechen</button>
          <button class="danger" id="deleteCustomerBtn" type="button" style="display:none;">Löschen</button>
          <button class="primary" id="saveCustomerBtn" type="button">Kunde speichern</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="site-copyright">&copy; 2026 / CTSH Systems</footer>
<script src="/theme.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/public/modules/pallets/open-pallet-countries.js?v=20260317-6"></script>
<script src="/public/modules/pallets/open-pallets.js?v=20260317-6"></script>
</body>
</html>
