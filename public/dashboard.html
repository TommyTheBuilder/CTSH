<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
<header class="topbar topbar-modern admin-topbar">
  <div class="system-logo-wrap">
    <img src="/public/logo.png" alt="Systemlogo" class="system-logo">
    <a href="dashboard.html" class="system-logo-home" aria-label="Zum Dashboard"></a>
    <a href="/public/dashboard.html" class="system-logo-home" aria-label="Zum Dashboard"></a>
  </div>
  <div class="row topbar-actions" style="align-items:center;">
    <div class="settings-menu-wrap" id="settingsMenuWrap">
      <button class="secondary settings-trigger" id="settingsTriggerBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Einstellungen öffnen">⚙️</button>
      <div class="settings-menu" id="settingsMenu" role="menu" aria-label="Einstellungen">
        <button class="secondary" id="openChangePasswordBtn" role="menuitem">Passwort ändern</button>
        <button class="secondary" id="openAdminBtn" role="menuitem" style="display:none;">Administration</button>
        <button class="secondary" id="menuDarkmodeBtn" role="menuitem">Darkmode umschalten</button>
        <button class="secondary" id="logoutBtn" role="menuitem">Logout</button>
      </div>
    </div>
    <div id="themeToggleMount" style="display:none;"></div>
  </div>
</header>

<main class="dashboard-main module-dashboard-main">
  <section class="dashboard-header admin-header">
    <div class="dashboard-title-row"><b>Modul-Dashboard</b> <span class="pill" id="me">-</span></div>
    <p class="muted" style="margin:8px 0 0;">Bitte wählen Sie ein Modul aus.</p>
  </section>

  <section class="card module-dashboard-card">
    <div class="module-grid">
      <a class="module-button module-button--stacked" href="/app.html" aria-label="Paletten Buchungen">
        <span class="module-button__icon module-button__icon--square" aria-hidden="true">
          <svg viewBox="0 0 64 64" focusable="false" aria-hidden="true">
            <rect x="13" y="8" width="38" height="48" rx="1.5" fill="#FFE2A0" stroke="#0B0B12" stroke-width="3"></rect>
            <rect x="19" y="12" width="6" height="40" fill="#FFC24D"></rect>
            <rect x="31" y="12" width="6" height="40" fill="#FFC24D"></rect>
            <rect x="43" y="12" width="6" height="40" fill="#FFC24D"></rect>
            <rect x="25" y="19" width="6" height="9" fill="#FFFFFF"></rect>
            <rect x="37" y="19" width="6" height="9" fill="#FFFFFF"></rect>
            <rect x="25" y="34" width="6" height="9" fill="#FFFFFF"></rect>
            <rect x="37" y="34" width="6" height="9" fill="#FFFFFF"></rect>
            <circle cx="18" cy="17" r="1.8" fill="#0B0B12"></circle>
            <circle cx="46" cy="17" r="1.8" fill="#0B0B12"></circle>
            <circle cx="18" cy="49" r="1.8" fill="#0B0B12"></circle>
            <circle cx="46" cy="49" r="1.8" fill="#0B0B12"></circle>
          </svg>
        </span>
        <span class="module-button__title">Paletten Buchungen</span>
      </a>
      <a class="module-button module-button--stacked" id="containerAdminLink" href="/container-registration" style="display:none;" aria-label="Container Anmeldung">
        <span class="module-button__icon module-button__icon--wide" aria-hidden="true">
          <svg viewBox="0 0 96 64" focusable="false" aria-hidden="true">
            <defs>
              <linearGradient id="registrationTruckGradient" x1="31" y1="30" x2="71" y2="30" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#FFB34A"></stop>
                <stop offset="1" stop-color="#FFD369"></stop>
              </linearGradient>
            </defs>
            <path d="M12 45V30h11l6-7h17v22z" fill="#FF5A7F" stroke="#09090F" stroke-width="3" stroke-linejoin="round"></path>
            <rect x="31" y="17" width="40" height="26" fill="url(#registrationTruckGradient)" stroke="#09090F" stroke-width="3"></rect>
            <rect x="38" y="22" width="4" height="16" rx="1" fill="#09090F"></rect>
            <rect x="46" y="22" width="4" height="16" rx="1" fill="#09090F"></rect>
            <rect x="54" y="22" width="4" height="16" rx="1" fill="#09090F"></rect>
            <rect x="62" y="22" width="4" height="16" rx="1" fill="#09090F"></rect>
            <rect x="16" y="44" width="58" height="5" fill="#FF5A7F" stroke="#09090F" stroke-width="3"></rect>
            <rect x="18" y="26" width="10" height="6" fill="#9BEEFF"></rect>
            <path d="M13 37h8" fill="none" stroke="#09090F" stroke-width="3" stroke-linecap="round"></path>
            <path d="M73 44h6" fill="none" stroke="#09090F" stroke-width="3" stroke-linecap="round"></path>
            <circle cx="24" cy="51" r="5" fill="#78AEEA" stroke="#09090F" stroke-width="3"></circle>
            <circle cx="45" cy="51" r="5" fill="#78AEEA" stroke="#09090F" stroke-width="3"></circle>
            <circle cx="76" cy="51" r="5" fill="#78AEEA" stroke="#09090F" stroke-width="3"></circle>
          </svg>
        </span>
        <span class="module-button__title">Container Anmeldung</span>
      </a>
      <a class="module-button module-button--stacked" id="containerPlanningLink" href="/modules/container-planning/index.html" style="display:none;">
        <span class="module-button__icon module-button__icon--wide" aria-hidden="true">
          <svg viewBox="0 0 96 64" focusable="false" aria-hidden="true">
            <path d="M12 43V27h12l6-7h18v23z" fill="#3D8CFF" stroke="#11111A" stroke-width="3" stroke-linejoin="round"></path>
            <rect x="31" y="13" width="47" height="30" rx="2" fill="#FF4457" stroke="#11111A" stroke-width="3"></rect>
            <rect x="19" y="23" width="9" height="6" fill="#EAF3FF"></rect>
            <rect x="39" y="18" width="4" height="19" rx="1.5" fill="#11111A"></rect>
            <rect x="47" y="18" width="4" height="19" rx="1.5" fill="#11111A"></rect>
            <rect x="55" y="18" width="4" height="19" rx="1.5" fill="#11111A"></rect>
            <rect x="63" y="18" width="4" height="19" rx="1.5" fill="#11111A"></rect>
            <rect x="21" y="43" width="51" height="6" fill="#6F6F76" stroke="#11111A" stroke-width="3"></rect>
            <path d="M70 43l8 6h6" fill="none" stroke="#11111A" stroke-width="3" stroke-linejoin="round"></path>
            <circle cx="18" cy="51" r="5" fill="#313138" stroke="#11111A" stroke-width="3"></circle>
            <circle cx="35" cy="51" r="5" fill="#313138" stroke="#11111A" stroke-width="3"></circle>
            <circle cx="56" cy="51" r="5" fill="#313138" stroke="#11111A" stroke-width="3"></circle>
            <circle cx="71" cy="51" r="5" fill="#313138" stroke="#11111A" stroke-width="3"></circle>
            <circle cx="18" cy="51" r="2.2" fill="#8D95A3"></circle>
            <circle cx="35" cy="51" r="2.2" fill="#8D95A3"></circle>
            <circle cx="56" cy="51" r="2.2" fill="#8D95A3"></circle>
            <circle cx="71" cy="51" r="2.2" fill="#8D95A3"></circle>
            <path d="M16 13c0-5 4-9 9-9" fill="none" stroke="#11111A" stroke-width="3" stroke-linecap="round"></path>
            <path d="M16 7c0-9 7-16 16-16" fill="none" stroke="#11111A" stroke-width="3" stroke-linecap="round"></path>
            <path d="M16 1c0-13 10-23 23-23" fill="none" stroke="#11111A" stroke-width="3" stroke-linecap="round"></path>
          </svg>
        </span>
        <span class="module-button__title">Container und LKW</span>
        <span class="module-button__subtitle">Planung</span>
      </a>
    </div>
    <p id="moduleMsg" style="margin:12px 0 0;"></p>
  </section>
</main>

<div class="modalBack" id="passwordModalBack" aria-hidden="true">
  <div class="modal" style="max-width:520px; width:100%; box-shadow:0 18px 45px rgba(15,23,42,.3); border:1px solid #e5e7eb;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h3 style="margin:0;">Passwort ändern</h3>
      <button class="secondary" type="button" id="closePasswordModalBtn" style="width:auto;">✕</button>
    </div>
    <div class="row">
      <div>
        <label>Aktuelles Passwort</label>
        <input id="currentPassword" type="password" autocomplete="new-password" placeholder="Aktuelles Passwort">
      </div>
      <div>
        <label>Neues Passwort</label>
        <input id="newPassword" type="password" autocomplete="new-password" placeholder="Mindestens 8 Zeichen">
      </div>
      <div>
        <label>Neues Passwort wiederholen</label>
        <input id="confirmPassword" type="password" autocomplete="new-password" placeholder="Passwort wiederholen">
      </div>
    </div>
    <p id="passwordModalMsg" style="margin:10px 0 0;"></p>
    <div class="row" style="justify-content:flex-end; margin-top:10px;">
      <button class="secondary" type="button" id="cancelPasswordBtn" style="min-width:140px;">Abbrechen</button>
      <button class="primary" id="savePasswordBtn" type="button">Passwort speichern</button>
    </div>
  </div>
</div>

<footer class="site-copyright">© 2026 / CTSH Systems</footer>
<script src="/public/theme.js"></script>
<script src="/public/dashboard.js"></script>
</body>
</html>
