<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
<header class="topbar topbar-modern admin-topbar">
  <a href="/dashboard.html" class="topbar-brand-link" aria-label="Zum Dashboard">
    <img src="/public/logo2.png" alt="CTSH" class="topbar-brand-logo">
  </a>
  <div class="row topbar-actions" style="align-items:center;">
    <div class="settings-menu-wrap" id="settingsMenuWrap">
      <button class="secondary settings-trigger" id="settingsTriggerBtn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Einstellungen öffnen">&#9881;</button>
      <div class="settings-menu" id="settingsMenu" role="menu" aria-label="Einstellungen">
        <button class="secondary" id="openCustomerAdminBtn" role="menuitem" style="display:none;">Organisations-Admin</button>
        <button class="secondary" id="openPalletAdminBtn" role="menuitem" style="display:none;">Paletten-Modul-Admin</button>
        <button class="secondary" id="openAppAdminBtn" role="menuitem" style="display:none;">Produkt-Admin</button>
        <button class="secondary" id="openChangePasswordBtn" role="menuitem">Passwort ändern</button>
        <button class="secondary" id="menuDarkmodeBtn" role="menuitem">Dunkelmodus</button>
        <button class="secondary" id="logoutBtn" role="menuitem">Logout</button>
      </div>
    </div>
    <div id="themeToggleMount" style="display:none;"></div>
  </div>
</header>

<main class="dashboard-main module-dashboard-main">
  <section class="dashboard-header admin-header module-hero">
    <div class="module-hero__copy">
      <span class="module-hero__eyebrow">Produktportal</span>
      <div class="dashboard-title-row">
        <b id="dashboardGreeting">Willkommen</b>
        <span class="pill" id="me">-</span>
      </div>
      <p class="module-hero__lead" id="dashboardLead">Start für freigeschaltete Module.</p>
    </div>
    <div class="module-hero__stats hub-stats">
      <article class="module-stat-card">
        <span class="module-section-kicker">Installation</span>
        <strong id="installationName">-</strong>
      </article>
      <article class="module-stat-card">
        <span class="module-section-kicker">Module</span>
        <strong id="moduleCount">0</strong>
      </article>
    </div>
  </section>

  <section class="card module-dashboard-card">
    <div class="module-dashboard-card__head">
      <div>
        <h2>Dashboard</h2>
      </div>
    </div>
    <div class="module-grid" id="dashboardModuleGrid"></div>
    <p id="moduleMsg" class="module-status-message"></p>
  </section>

  <section class="dashboard-split-grid">
    <article class="card admin-card">
      <div class="admin-card-head compact">
        <div>
          <span class="section-eyebrow">Schnellzugriff</span>
          <h3>Administration</h3>
          <p>Verwaltung und Freigaben.</p>
        </div>
      </div>
      <div class="quick-action-grid">
        <button class="secondary" id="quickCustomerAdminBtn" type="button" style="display:none;">Organisations-Admin</button>
        <button class="secondary" id="quickPalletAdminBtn" type="button" style="display:none;">Paletten-Modul-Admin</button>
        <button class="secondary" id="quickAppAdminBtn" type="button" style="display:none;">Produkt-Admin</button>
      </div>
    </article>

    <article class="card admin-card">
      <div class="admin-card-head compact">
        <div>
          <span class="section-eyebrow">Live Feed</span>
          <h3>Letzte Aktivitäten</h3>
          <p>Aktivitäten dieser Installation.</p>
        </div>
      </div>
      <div class="module-feed" id="dashboardLiveFeed" role="log" aria-live="polite">
        <div class="module-feed__empty">Live Feed wird geladen...</div>
      </div>
    </article>
  </section>
</main>

<div class="modalBack" id="passwordModalBack" aria-hidden="true">
  <div class="modal password-modal" role="dialog" aria-modal="true" aria-labelledby="passwordModalTitle">
    <div class="password-modal-head">
      <h3 id="passwordModalTitle">Passwort ändern</h3>
      <button class="secondary" id="closePasswordModalBtn" type="button">Schließen</button>
    </div>
    <div class="row" style="margin-top:8px;">
      <div>
        <label for="currentPassword">Aktuelles Passwort</label>
        <input id="currentPassword" type="password" autocomplete="new-password">
      </div>
      <div>
        <label for="newPassword">Neues Passwort</label>
        <input id="newPassword" type="password" autocomplete="off">
      </div>
      <div>
        <label for="confirmPassword">Passwort wiederholen</label>
        <input id="confirmPassword" type="password" autocomplete="off">
      </div>
    </div>
    <p id="passwordModalMsg"></p>
    <div class="row" style="justify-content:flex-end; margin-top:8px;">
      <button class="secondary" id="cancelPasswordBtn" type="button">Abbrechen</button>
      <button class="primary" id="savePasswordBtn" type="button">Speichern</button>
    </div>
  </div>
</div>

<footer class="site-copyright">&copy; 2026 / CTSH Systems</footer>
<script src="/public/theme.js"></script>
<script src="/public/dashboard.js"></script>
</body>
</html>
